<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Mods — JustLoofy Mods</title>
  <meta name="description" content="Browse every mod in the JustLoofy store — filter by game, search, and sort.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="container">
      <div class="page-head">
        <h1>All mods</h1>
        <p>Every release, in one place. Filter by game or search for something specific.</p>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <input type="search" id="search" placeholder="Search mods..." autocomplete="off">
        </div>
        <select id="sort" style="width:auto">
          <option value="newest">Newest first</option>
          <option value="popular">Most downloaded</option>
          <option value="price-low">Price: low → high</option>
          <option value="price-high">Price: high → low</option>
        </select>
      </div>
      <div class="chips" id="game-chips" style="margin-bottom:30px"></div>

      <div class="mod-grid" id="mods-grid" style="padding-bottom:70px">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script type="module" src="js/pages/mods.js"></script>
</body>
</html>
